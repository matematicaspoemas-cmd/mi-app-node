<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecciones - DAXS English IA</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/admin/levels.css">
</head>

<body>
  <aside class="sidebar">
    <div class="logo">
      <h2>DAXS</h2>
      <p>Lecciones</p>
    </div>

    <nav>
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/levels.html">Niveles</a>
      <a href="/admin/lessons.html" class="active">Lecciones</a>
      <a href="/admin/exams.html">Examenes</a>
      <a href="/admin/payments.html">Pagos</a>
    </nav>

    <button class="logoutBtn" onclick="logout()">Salir</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Constructor de contenido</p>
        <h1>Plantillas de lecciones</h1>
      </div>
    </header>

    <section class="toolbar">
      <label class="searchBox">
        <span>Nivel</span>
        <select id="lessonLevelSelect"></select>
      </label>
    </section>

    <section class="builderPanel">
      <form class="builderForm" id="lessonForm">
        <div class="sectionTitle">
          <h2>Crear leccion</h2>
          <button type="submit">Guardar leccion</button>
        </div>

        <div class="formGrid">
          <label>
            <span>Numero</span>
            <input id="lessonNumber" type="number" min="1" max="10" value="1">
          </label>
          <label>
            <span>Titulo</span>
            <input id="lessonTitle" placeholder="Leccion 1: Saludos">
          </label>
          <label>
            <span>Preguntas del test</span>
            <input id="lessonTestQuestions" type="number" min="1" value="10">
          </label>
          <label>
            <span>Aprobacion test</span>
            <input id="lessonTestPassing" type="number" min="1" max="100" value="70">
          </label>
        </div>

        <label>
          <span>Objetivo</span>
          <input id="lessonObjective" placeholder="El estudiante podra presentarse en ingles.">
        </label>

        <label>
          <span>Contenido</span>
          <textarea id="lessonContent" placeholder="Escribe aqui la explicacion, ejemplos o dialogo de la leccion."></textarea>
        </label>

        <label>
          <span>Tarea</span>
          <textarea id="lessonHomework" placeholder="Ejemplo: grabar una presentacion de 30 segundos."></textarea>
        </label>

        <label>
          <span>Puntaje pronunciacion IA</span>
          <input id="lessonPronunciationScore" type="number" min="1" max="100" value="75">
        </label>
      </form>

      <article class="previewPanel" id="lessonLivePreview"></article>
    </section>

    <section id="lessonPreview"></section>
  </main>

  <script src="/js/admin.js"></script>
  <script src="/js/admin/curriculum-data.js"></script>
  <script src="/js/admin/content-store.js"></script>
  <script src="/js/admin/lessons.js"></script>
</body>

</html>
