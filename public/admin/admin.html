<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Panel - DAXS</title>

  <!-- ===== FAVICON ===== -->

  <link
    rel="icon"
    type="image/png"
    href="/assets/icons/icon-192.png"
  >

  <!-- ===== GOOGLE FONT ===== -->

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- ===== CSS ===== -->

  <link
    rel="stylesheet"
    href="/css/admin.css"
  >

</head>

<body>

  <!-- ===== SIDEBAR ===== -->

  <aside class="sidebar">

    <div class="logo">

      <h2>🚀 DAXS</h2>

      <p>ADMIN PANEL</p>

    </div>

    <nav>

      <a href="/admin/admin.html">
        🏠 Dashboard
      </a>

      <a href="/admin/levels.html">
        📚 Niveles
      </a>

      <a href="/admin/lessons.html">
        🎓 Lecciones
      </a>

      <a href="/admin/students.html">
        👨‍🎓 Estudiantes
      </a>

      <a href="/admin/payments.html">
        💳 Pagos
      </a>

    </nav>

    <button
      class="logoutBtn"
      onclick="logout()"
    >
      🚪 Cerrar Sesión
    </button>

  </aside>

  <!-- ===== MAIN ===== -->

  <main class="main">

    <!-- ===== TOPBAR ===== -->

    <header class="topbar">

      <h1>
        Dashboard Administrativo
      </h1>

      <div class="adminInfo">

        <img
          id="adminPhoto"
          src="/assets/default.png"
          alt="Admin"
        >

        <span id="adminName">
          Admin
        </span>

      </div>

    </header>

    <!-- ===== CARDS ===== -->

    <section class="cards">

      <div class="card">

        <h3>👨‍🎓 Estudiantes</h3>

        <p id="studentsCount">
          0
        </p>

      </div>

      <div class="card">

        <h3>📚 Lecciones</h3>

        <p id="lessonsCount">
          0
        </p>

      </div>

      <div class="card">

        <h3>💳 Pagos</h3>

        <p id="paymentsCount">
          0
        </p>

      </div>

      <div class="card">

        <h3>🔥 Cursos</h3>

        <p id="levelsCount">
          0
        </p>

      </div>

    </section>

    <!-- ===== TABLE ===== -->

    <section class="tableContainer">

      <h2>
        Últimos Usuarios
      </h2>

      <table>

        <thead>

          <tr>

            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>

          </tr>

        </thead>

        <tbody id="usersTable">

        </tbody>

      </table>

    </section>

  </main>

  <!-- ===== JS ===== -->

  <script src="/js/admin.js"></script>

</body>

</html>
