<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="/css/dashboard.css">

</head>

<body>

<div class="sidebar">

  <h2>🚀 DAXS APP</h2>
<img
  id="fotoPerfil"
  src="https://i.imgur.com/6VBx3io.png"
  class="fotoPerfil"
/>
  <p id="userName" class="loading">
    Cargando usuario...
  </p>

  <button onclick="irPerfil()">
    👤 Actualizar Perfil
  </button>

  <button onclick="logout()">
    🚪 Cerrar sesión
  </button>

</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="card">

    <h3>📊 Estado del usuario</h3>

    <p id="email" class="loading">
      Cargando...
    </p>

    <p id="rol" class="loading">
      Cargando...
    </p>

  </div>

  <div class="card">

    <h3>🔥 Progreso</h3>

    <p>
      Lecciones completadas: 0
    </p>

  </div>

</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
