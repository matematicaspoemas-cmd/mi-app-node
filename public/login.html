<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Login - DAXS</title>

  <!-- CSS -->
  <link rel="stylesheet"
        href="/css/login.css">

  <!-- PWA -->
  <link rel="manifest"
        href="/manifest.json">

  <!-- COLOR APP -->
  <meta name="theme-color"
        content="#00d9ff">

  <!-- IOS -->
  <meta name="apple-mobile-web-app-capable"
        content="yes">

  <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

</head>

<body class="page">

  <div class="card animate-in">

    <h2>🔐 Login</h2>

    <input
      id="email"
      type="email"
      placeholder="Email"
      autocomplete="email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
      autocomplete="current-password"
    >

    <button id="loginBtn">
      Entrar
    </button>

    <div
      class="error"
      id="error"
    ></div>

    <p class="registerText">

      <a href="/register.html">
        Crear cuenta
      </a>

    </p>

  </div>

  <!-- APP -->
  <script src="/js/app.js"></script>

  <!-- LOGIN -->
  <script src="/js/login.js"></script>

</body>

</html>
