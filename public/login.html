<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <title>Login - DAXS</title>

  <link rel="stylesheet" href="/css/login.css">

</head>

<body>

  <div class="card">

    <h2>🔐 Login</h2>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Entrar
    </button>

    <div
      class="error"
      id="error"
    ></div>

    <p class="registerText">

      <a href="/register.html">
        Crear cuenta
      </a>

    </p>

  </div>

  <script src="/js/login.js"></script>

</body>

</html>
